services:
  - type: web
    name: mewai
    runtime: python
    plan: starter            # free tier also works; starter avoids cold-stop on idle
    numInstances: 1          # REQUIRED: in-memory game state means no horizontal scaling
    buildCommand: pip install -r requirements.txt
    startCommand: python3 app.py
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: INWORLD_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
