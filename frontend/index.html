<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEWAI — Behavioral De-escalation Simulation</title>
  <link rel="stylesheet" href="/frontend/style.css" />
</head>
<body>

<!-- ═══════════════════════════════════
     START SCREEN
═══════════════════════════════════ -->
<div id="screen-start" class="screen active">
  <img id="start-bg" src="/scenes/background.jpg" alt="background" />
  <div id="start-content">
    <h1>MEWAI — De-escalation Simulation</h1>
    <p>Behavioral training for medical students</p>
    <button class="btn btn-primary" id="btn-start">Start</button>
  </div>
</div>

<!-- ═══════════════════════════════════
     INTRO SCREEN
═══════════════════════════════════ -->
<div id="screen-intro" class="screen">
  <div id="intro-image-col">
    <img id="intro-scene" src="/scenes/start.jpg" alt="scenario" />
  </div>
  <div id="intro-text-col">
    <h2>Case Introduction</h2>
    <p id="intro-text"></p>
    <div id="intro-goal-box">
      <h3>Your Goal</h3>
      <p id="intro-goal-text"></p>
    </div>
    <button class="btn btn-success" id="btn-begin">Begin Simulation</button>
  </div>
</div>

<!-- ═══════════════════════════════════
     GAME SCREEN
═══════════════════════════════════ -->
<div id="screen-game" class="screen">

  <!-- Left column -->
  <div id="game-left">
    <div id="scene-wrapper">
      <img id="scene-img" src="/scenes/start.jpg" alt="scene" />
      <div id="timer">5:00</div>
      <div id="action-badge"></div>
    </div>

    <div id="esc-section">
      <div id="esc-label-row">
        <span>Escalation Level</span>
        <span id="esc-value">5 / 10</span>
      </div>
      <div id="esc-track">
        <div id="esc-fill" style="width:50%; background:#eab308;"></div>
      </div>
    </div>

    <div id="gradio-container"></div>
  </div>

  <!-- Right column -->
  <div id="game-right">
    <div id="transcript-header">Conversation Transcript</div>
    <div id="transcript">
      <div id="waiting">
        <div class="dot-pulse">
          <span></span><span></span><span></span>
        </div>
        Waiting for patient response…
      </div>
    </div>
  </div>

</div>

<!-- ═══════════════════════════════════
     END SCREEN
═══════════════════════════════════ -->
<div id="screen-end" class="screen">
  <div id="end-hero">
    <img id="end-scene" src="/scenes/success.jpg" alt="result" />
    <div id="end-hero-text">
      <div id="end-title"></div>
      <div id="end-reason"></div>
    </div>
  </div>
  <div id="end-body">
    <h3>Actions — Found vs. Missed</h3>
    <div id="actions-checklist"></div>
    <p id="end-note">Full evaluation rubric coming in future update.</p>
    <button class="btn btn-primary" id="btn-again">Play Again</button>
  </div>
</div>

<script src="/frontend/app.js"></script>
</body>
</html>
